<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>108下终极计数器</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 50px; }
    input { font-size: 1rem; width: 200px; padding: 5px; }
    button { font-size: 1rem; padding: 5px 15px; margin-left: 10px; }
    #counter { font-size: 2rem; margin-top: 20px; color: #d2691e; }
  </style>
</head>
<body>
  <h1>欢迎使用108下敲钟计数器</h1>

  <div>
    <input type="number" id="intervalInput" placeholder="请输入间隔秒数" />
    <button id="startBtn">开始108下</button>
  </div>

  <div id="counter">当前：0 / 108</div>

  <script>
    const button = document.getElementById("startBtn");
    const input = document.getElementById("intervalInput");
    const counter = document.getElementById("counter");

    let count = 0;
    let timer = null;

    button.addEventListener("click", function() {
      const intervalSeconds = parseFloat(input.value);
      if (isNaN(intervalSeconds) || intervalSeconds <= 0) {
        alert("请输入有效的秒数");
        return;
      }

      count = 0;
      counter.textContent = `当前：0 / 108`;
      clearInterval(timer);

      // 🔓 首次解锁浏览器自动播放
      const first = new Audio("sound.wav");
      first.play().catch(err => console.log("首次播放失败:", err));

      timer = setInterval(() => {
        count++;
        counter.textContent = `当前：${count} / 108`;

        const a = new Audio("sound.wav");
        a.play().catch(err => console.log("播放失败:", err));

        if (count >= 108) {
          clearInterval(timer);
          alert("108下已完成！");
        }
      }, intervalSeconds * 1000);
    });
  </script>
</body>
</html>
